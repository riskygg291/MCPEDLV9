<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - MCPEDLV5</title>

<link rel="stylesheet" href="login.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="background">

<div class="blur one"></div>

<div class="blur two"></div>

</div>

<div class="login-container">

<div class="logo">

<i class="fa-solid fa-cube"></i>

<h1>MCPEDLV5</h1>

</div>

<h2>Welcome Back</h2>

<p>

Login using your Google Account to upload addons,
give ratings, write comments and manage your profile.

</p>

<div class="login-card">

<button id="googleLogin">

<i class="fa-brands fa-google"></i>

<span>Continue with Google</span>

</button>

<div class="divider">

<span>OR</span>

</div>

<button class="guest">

Continue as Guest

</button>

</div>

<div class="features">

<div class="item">

<i class="fa-solid fa-cloud-arrow-up"></i>

<h3>Upload</h3>

<p>Upload your own addon.</p>

</div>

<div class="item">

<i class="fa-solid fa-star"></i>

<h3>Rating</h3>

<p>Rate every addon.</p>

</div>

<div class="item">

<i class="fa-solid fa-comments"></i>

<h3>Comments</h3>

<p>Join the community.</p>

</div>

</div>

</div>

<script type="module" src="firebase.js"></script>

<script type="module" src="login.js"></script>

</body>
</html>
